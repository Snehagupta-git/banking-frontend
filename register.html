<<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="register.css">

  <script>
    if (localStorage.getItem("token")) {
      window.location.href = "dashboard.html";
    }
  </script>
</head>

<body>
  

<div class="main">

  <!-- LEFT FORM -->
  <div class="left">

    <h1>Create Account ✨</h1>
    <p class="sub">Join your bank in seconds</p>

    <input id="name" placeholder="Full Name" autocomplete="off">

    <input id="username" placeholder="Username" autocomplete="off">
    <small id="usernameError" class="error"></small>

    <input id="password" type="password" placeholder="Password" autocomplete="new-password">

    <button onclick="register()">Register</button>

    <p class="link">
      Already have account?
      <a href="login.html">Login</a>
    </p>

  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <div class="illustration">
      🏦
    </div>
  </div>

</div>

<div id="toast" class="toast"></div>

<script src="script.js"></script>
</body>
</html>
