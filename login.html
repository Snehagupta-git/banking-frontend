<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="main">

  <!-- LEFT -->
  <div class="left">
    <h1>Welcome Back 👋</h1>
    <p class="sub">Login to continue to your bank account</p>

    <input id="username" placeholder="Username" autocomplete="off">
    <input id="password" type="password" placeholder="Password" autocomplete="new-password">

    

    <button onclick="login()">Login In</button>

    <p class="link">New user? <a href="register.html">Register</a></p>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="illustration">
      💳
    </div>
  </div>
  <div id="toast" class="toast"></div>

</div>

<script src="script.js"></script>
</body>
</html>
